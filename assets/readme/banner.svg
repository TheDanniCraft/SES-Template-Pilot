<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03101D"/>
      <stop offset="0.5" stop-color="#041627"/>
      <stop offset="1" stop-color="#072138"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 120) rotate(90) scale(230 360)">
      <stop stop-color="#06B6D4" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 240) rotate(90) scale(220 420)">
      <stop stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#7DD3FC" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>

    <radialGradient id="gridMaskGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 170) rotate(90) scale(280 1000)">
      <stop stop-color="white" stop-opacity="0.9"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="gridMask">
      <rect width="1600" height="420" fill="url(#gridMaskGradient)"/>
    </mask>

    <linearGradient id="titleGradient" x1="420" y1="100" x2="1180" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CCFBF1"/>
      <stop offset="0.55" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="520" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#22D3EE" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#67E8F9" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#22D3EE" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <rect width="1600" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="420" rx="28" fill="url(#glowLeft)"/>
  <rect width="1600" height="420" rx="28" fill="url(#glowRight)"/>
  <rect width="1600" height="420" rx="28" fill="url(#grid)" mask="url(#gridMask)" opacity="0.72"/>

  <text x="800" y="190" text-anchor="middle" fill="url(#titleGradient)" font-family="Segoe UI, Arial, sans-serif" font-size="74" font-weight="800">
    SES Template Pilot
  </text>
  <text x="800" y="246" text-anchor="middle" fill="#CFE4F5" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    From Draft to Delivery
  </text>
  <rect x="520" y="272" width="560" height="4" rx="2" fill="url(#accentLine)"/>

</svg>
