name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deps:
    name: Prepare dependency cache
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.compute-key.outputs.key }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Compute cache key
        id: compute-key
        run: echo "key=${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}" >> "$GITHUB_OUTPUT"

      - name: Restore Bun and node_modules cache
        id: restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ steps.compute-key.outputs.key }}

      - name: Install dependencies
        if: steps.restore.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Save Bun and node_modules cache
        if: steps.restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ steps.compute-key.outputs.key }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ needs.deps.outputs.cache-key }}

      - name: Run lint
        run: bun run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Restore dependency cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ needs.deps.outputs.cache-key }}

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Run build
        env:
          POLAR_VALIDATE_INTERVAL_SECONDS: ${{ vars.POLAR_VALIDATE_INTERVAL_SECONDS }}
          NEXT_PUBLIC_POLAR_CHECKOUT_URL: ${{ vars.NEXT_PUBLIC_POLAR_CHECKOUT_URL }}
          LICENSE_SERVER_URL: ${{ vars.LICENSE_SERVER_URL }}
        run: bun run build
